<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AzureNotes - Aplikasi Catatan</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen show">
        <!-- Login Form -->
        <div id="loginForm" class="auth-form show">
            <div class="auth-container">
                <div class="auth-header">
                    <h1>📝 AzureNotes</h1>
                    <p>Catat semua ide dan kegiatan Anda</p>
                </div>

                <form id="loginFormElement" class="form-content">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input 
                            type="email" 
                            id="loginEmail" 
                            class="form-input" 
                            placeholder="Masukkan email Anda"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input 
                            type="password" 
                            id="loginPassword" 
                            class="form-input" 
                            placeholder="Masukkan password Anda"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        Login
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Belum punya akun? 
                        <a href="#" id="switchToRegister" class="auth-link">Daftar di sini</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="auth-form">
            <div class="auth-container">
                <div class="auth-header">
                    <h1>📝 AzureNotes</h1>
                    <p>Buat akun baru untuk memulai</p>
                </div>

                <form id="registerFormElement" class="form-content">
                    <div class="form-group">
                        <label for="registerUsername">Username</label>
                        <input 
                            type="text" 
                            id="registerUsername" 
                            class="form-input" 
                            placeholder="Pilih username Anda"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input 
                            type="email" 
                            id="registerEmail" 
                            class="form-input" 
                            placeholder="Masukkan email Anda"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Password</label>
                        <input 
                            type="password" 
                            id="registerPassword" 
                            class="form-input" 
                            placeholder="Minimal 6 karakter"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="registerPasswordConfirm">Konfirmasi Password</label>
                        <input 
                            type="password" 
                            id="registerPasswordConfirm" 
                            class="form-input" 
                            placeholder="Konfirmasi password Anda"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        Daftar
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Sudah punya akun? 
                        <a href="#" id="switchToLogin" class="auth-link">Login di sini</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="appScreen" class="app-screen">
        <!-- Header dengan User Info & Logout -->
        <header class="app-header">
            <div class="header-left">
                <h1>📝 AzureNotes</h1>
                <p class="subtitle">Catat semua ide dan kegiatan Anda</p>
            </div>
            <div class="header-right">
                <span id="userDisplay" class="user-display">👤 User</span>
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>
        </header>

        <div class="container">
            <!-- Search & Filter -->
            <div class="search-section">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="🔍 Cari catatan..."
                >
                <button id="newNoteBtn" class="btn btn-primary">+ Catatan Baru</button>
            </div>

            <!-- Filter Tags -->
            <div class="filter-tags" id="filterTags"></div>

            <!-- Notes Container -->
            <div class="notes-container" id="notesContainer">
                <div class="empty-state">
                    <p>📭 Belum ada catatan</p>
                    <p class="empty-subtitle">Mulai dengan membuat catatan baru!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Edit/Create -->
    <div id="noteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Catatan Baru</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <input 
                    type="text" 
                    id="noteTitle" 
                    class="note-title-input" 
                    placeholder="Judul catatan..."
                >
                <textarea 
                    id="noteContent" 
                    class="note-content-input" 
                    placeholder="Tulis catatan Anda di sini..."
                ></textarea>
                <input 
                    type="text" 
                    id="noteTags" 
                    class="note-tags-input" 
                    placeholder="Tag (pisahkan dengan koma, misal: penting, work)"
                >
            </div>
            <div class="modal-footer">
                <button id="cancelBtn" class="btn btn-secondary">Batal</button>
                <button id="deleteBtn" class="btn btn-danger" style="display:none;">Hapus</button>
                <button id="saveBtn" class="btn btn-primary">Simpan</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Scripts -->
    <script src="js/database.js"></script>
    <script src="js/authManager.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
